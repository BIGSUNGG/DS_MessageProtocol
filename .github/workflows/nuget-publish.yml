name: Publish NuGet packages

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Compute package version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION (from tag $TAG)"

      - name: Build solution (Release)
        run: dotnet build MessageProtocol.sln -c Release

      - name: Pack library projects (Release)
        run: |
          set -euo pipefail
          V="${{ steps.ver.outputs.version }}"
          dotnet pack "Source/MessageProtocol.Core/MessageProtocol.Core.csproj" \
            -c Release -p:Version="$V" -o "${{ github.workspace }}/artifacts"
          dotnet pack "Source/MessageProtocol.CodeGenerator/MessageProtocol.CodeGenerator.csproj" \
            -c Release -p:Version="$V" -o "${{ github.workspace }}/artifacts"
          dotnet pack "Source/MessageProtocol/MessageProtocol.csproj" \
            -c Release -p:Version="$V" -o "${{ github.workspace }}/artifacts"

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${NUGET_API_KEY}" ]; then
            echo "::error::NUGET_API_KEY secret is not set. Add it in repository Settings → Secrets and variables → Actions."
            exit 1
          fi
          shopt -s nullglob
          for f in artifacts/*.nupkg; do
            dotnet nuget push "$f" \
              --api-key "$NUGET_API_KEY" \
              --source "https://api.nuget.org/v3/index.json" \
              --skip-duplicate
          done
